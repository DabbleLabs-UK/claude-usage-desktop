<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Usage</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0d1a;
      --surface: #151526;
      --card:    #1b1b30;
      --border:  #252540;
      --text:    #dde1f0;
      --muted:   #60688a;
      --dim:     #8890b0;
      --accent:  #a78bfa;
      --green:   #34d399;
      --yellow:  #fbbf24;
      --orange:  #f97316;
      --red:     #ef4444;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .toolbar {
      padding: 10px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .meta {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .meta-text {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 3px;
    }

    .updated {
      font-size: 0.68rem;
      color: var(--muted);
    }

    .stale {
      display: none;
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: #7c2d12;
      color: #fca5a5;
      padding: 1px 7px;
      border-radius: 999px;
    }
    .stale.show { display: inline; }

    .gear-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.05rem;
      cursor: pointer;
      padding: 5px 7px;
      border-radius: 7px;
      line-height: 1;
      flex-shrink: 0;
    }
    .gear-btn:hover { color: var(--text); background: var(--border); }

    main {
      flex: 1;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 9px;
      overflow-y: auto;
    }

    .hidden { display: none !important; }

    .loading {
      color: var(--muted);
      font-size: 0.85rem;
      text-align: center;
      margin-top: 48px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 11px;
      padding: 13px 15px;
    }

    .card.dim { opacity: 0.42; }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 9px;
    }

    .label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .pct {
      font-size: 1.35rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    /* Compact-mode time-remaining (right side of compact head) */
    .time-rem {
      font-size: 0.9rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--text);
    }

    .track {
      position: relative;
      height: 5px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .proj-track {
      position: relative;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-top: -4px;
      margin-bottom: 6px;
    }

    .fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    /* Bar overlay label: hidden in full mode */
    .bar-label {
      display: none;
      position: absolute;
      left: 6px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.58rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: rgba(255, 255, 255, 0.82);
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
      line-height: 1;
    }

    /* Compact-mode header row: hidden in full mode */
    .compact-only { display: none; }

    /* proj-text and reset sit side-by-side in .card-footer */
    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      flex-wrap: nowrap;
    }

    .proj-text {
      font-size: 0.68rem;
      flex-shrink: 0;
    }

    .reset {
      font-size: 0.72rem;
      color: var(--dim);
    }

    .reset b { color: var(--text); font-weight: 600; }

    .billing {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 11px;
      padding: 11px 15px;
    }

    .billing-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .billing .label { margin: 0; }

    .billing-amount {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text);
    }

    /* ── Compact mode ──────────────────────────────────────────────────
       Triggers when the viewport is phone-width narrow (<= 400px) OR
       phone-portrait-with-keyboard-up short (<= 500px).
       Default window (420 x 720) stays in full mode; drag narrower or
       shorter to preview the phone layout.
    ──────────────────────────────────────────────────────────────────── */
    @media (max-width: 400px), (max-height: 500px) {
      main { padding: 8px; gap: 6px; }

      .card { padding: 9px 11px; }
      .card-head { margin-bottom: 6px; }

      /* Taller bars so overlay text has room */
      .track     { height: 18px; margin-bottom: 4px; }
      .proj-track { height: 14px; margin-top: 0; margin-bottom: 4px; }

      .bar-label  { display: block; }

      .compact-only { display: flex; }
      .full-only    { display: none !important; }
    }

    /* Settings view */
    .settings-view {
      flex: 1;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
    }

    .settings-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 2px;
    }

    .settings-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text);
    }

    .back-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.75rem;
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 7px;
    }
    .back-btn:hover { color: var(--text); border-color: var(--muted); }

    .setting-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 11px;
      padding: 12px 15px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .setting-label {
      font-size: 0.82rem;
      color: var(--text);
    }

    .setting-note {
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .toggle {
      flex-shrink: 0;
      width: 40px;
      height: 22px;
      appearance: none;
      -webkit-appearance: none;
      background: var(--border);
      border-radius: 11px;
      cursor: pointer;
      position: relative;
      transition: background 0.2s;
    }
    .toggle:checked { background: var(--accent); }
    .toggle::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      background: white;
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: transform 0.2s;
    }
    .toggle:checked::after { transform: translateX(18px); }

    .port-input {
      flex-shrink: 0;
      width: 78px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.85rem;
      padding: 4px 8px;
      text-align: right;
    }
    .port-input:focus { outline: none; border-color: var(--accent); }

    .save-btn {
      background: var(--accent);
      color: #0d0d1a;
      font-weight: 700;
      font-size: 0.82rem;
      border: none;
      border-radius: 8px;
      padding: 11px;
      cursor: pointer;
      width: 100%;
    }
    .save-btn:hover { opacity: 0.88; }
    .save-btn:disabled { opacity: 0.45; cursor: default; }

    .save-msg {
      font-size: 0.72rem;
      text-align: center;
      min-height: 1.2em;
    }
  </style>
</head>
<body>

<main id="mainView">
  <div class="loading">Loading...</div>
</main>

<div id="settingsView" class="settings-view hidden">
  <div class="settings-header">
    <button class="back-btn" onclick="closeSettings()">&#8592; Back</button>
    <span class="settings-title">Settings</span>
  </div>

  <div class="setting-card">
    <div class="setting-row">
      <div>
        <div class="setting-label">Start with Windows</div>
      </div>
      <input type="checkbox" id="settingAutostart" class="toggle">
    </div>
    <div class="setting-row">
      <div>
        <div class="setting-label">Close to tray</div>
        <div class="setting-note">Hides instead of quitting when window is closed</div>
      </div>
      <input type="checkbox" id="settingCloseToTray" class="toggle">
    </div>
    <div class="setting-row">
      <div>
        <div class="setting-label">Server port</div>
        <div class="setting-note">Restart required to take effect</div>
      </div>
      <input type="number" id="settingPort" class="port-input" min="1024" max="65535">
    </div>
  </div>

  <button id="saveBtn" class="save-btn" onclick="saveSettings()">Save Settings</button>
  <div id="saveMsg" class="save-msg"></div>
</div>

<div class="toolbar">
  <div class="meta">
    <div class="meta-text">
      <span class="updated" id="updatedEl">--</span>
      <span class="stale" id="staleEl">Stale</span>
    </div>
  </div>
  <button class="gear-btn" onclick="openSettings()" title="Settings">&#9881;</button>
</div>

<script src="https://unpkg.com/@microsoft/signalr@8.0.0/dist/browser/signalr.min.js"></script>
<script>
  let lastData = null;

  function color(pct) {
    if (pct >= 100) return 'var(--red)';
    if (pct >= 85)  return 'var(--orange)';
    if (pct >= 70)  return 'var(--yellow)';
    return 'var(--green)';
  }

  function projColor(pct) {
    if (pct > 100) return 'var(--red)';
    if (pct >= 80) return 'var(--yellow)';
    return 'var(--green)';
  }

  // Full-mode relative time: "3h 39m", "2d 4h", etc.
  function timeUntil(iso) {
    const ms = new Date(iso) - Date.now();
    if (ms <= 0) return 'now';
    const h = Math.floor(ms / 3600000);
    const m = Math.floor((ms % 3600000) / 60000);
    if (h >= 24) { const d = Math.floor(h / 24); return d + 'd ' + (h % 24) + 'h'; }
    if (h > 0) return h + 'h ' + m + 'm';
    return m + 'm';
  }

  // Compact-mode time: always shows hours (even 0h), leading-zero mins,
  // days only when non-zero. e.g. "4h 03m", "2d 14h 03m", "0h 07m".
  function timeCompact(iso) {
    const ms = new Date(iso) - Date.now();
    if (ms <= 0) return '0h 00m';
    const totalMin = Math.floor(ms / 60000);
    const days  = Math.floor(totalMin / 1440);
    const hours = Math.floor((totalMin % 1440) / 60);
    const mins  = totalMin % 60;
    const mm = String(mins).padStart(2, '0');
    return (days > 0 ? days + 'd ' : '') + hours + 'h ' + mm + 'm';
  }

  function fmtPct(p) {
    return (p % 1 === 0 ? p.toFixed(0) : p.toFixed(1)) + '%';
  }

  function currencySymbol(code) {
    if (code === 'GBP') return '£';
    if (code === 'USD') return '$';
    if (code === 'EUR') return '€';
    return code + ' ';
  }

  // windowMs: 5-hour or 7-day window in ms (falsy = no projection)
  // compactLabel: short label shown in compact mode ("Session", "Week")
  function card(label, w, windowMs, compactLabel) {
    if (!w) return (
      '<div class="card dim">'
      + '<div class="card-head">'
      + '<span class="label">' + label + '</span>'
      + '<span class="pct" style="color:var(--muted)">--</span>'
      + '</div>'
      + '<div class="track"><div class="fill" style="width:0%;background:var(--border)"></div></div>'
      + '<div class="reset">Not tracked this period</div>'
      + '</div>');

    const pct  = w.utilization;
    const c    = color(pct);
    const barW = Math.min(pct, 100).toFixed(1);
    const rel  = timeUntil(w.resetsAt);

    if (windowMs) {
      const relC     = timeCompact(w.resetsAt);
      const resetsAt = new Date(w.resetsAt).getTime();
      const elapsed  = Math.max(0.01, Math.min(1, (Date.now() - (resetsAt - windowMs)) / windowMs));
      const proj     = pct / elapsed;
      const projBarW = Math.min(proj, 100).toFixed(1);
      const pc       = projColor(proj);
      const projMsg  = proj > 100
        ? 'Projected: ' + Math.round(proj) + '% -- over limit'
        : 'Projected: ' + Math.round(proj) + '% by reset';

      return (
        '<div class="card">'
        // Full-mode head: label + large percentage
        + '<div class="card-head full-only">'
        + '<span class="label">' + label + '</span>'
        + '<span class="pct" style="color:' + c + '">' + fmtPct(pct) + '</span>'
        + '</div>'
        // Compact-mode head: short label + time remaining
        + '<div class="card-head compact-only">'
        + '<span class="label">' + (compactLabel || label) + '</span>'
        + '<span class="time-rem">' + relC + '</span>'
        + '</div>'
        // Actual bar (ghosted) + overlay
        + '<div class="track">'
        + '<div class="fill" style="width:' + barW + '%;background:' + c + ';opacity:0.55"></div>'
        + '<span class="bar-label">Actual</span>'
        + '</div>'
        // Projection bar (solid) + overlay
        + '<div class="proj-track">'
        + '<div class="fill" style="width:' + projBarW + '%;background:' + pc + '"></div>'
        + '<span class="bar-label">Projected</span>'
        + '</div>'
        // Full-mode footer: proj sentence LEFT, reset countdown RIGHT
        + '<div class="card-footer full-only">'
        + '<span class="proj-text" style="color:' + pc + '">' + projMsg + '</span>'
        + '<span class="reset">Resets in <b>' + rel + '</b></span>'
        + '</div>'
        + '</div>');
    }

    // Non-windowed card (Sonnet, Opus) -- no projection, no compact variant
    return (
      '<div class="card">'
      + '<div class="card-head">'
      + '<span class="label">' + label + '</span>'
      + '<span class="pct" style="color:' + c + '">' + fmtPct(pct) + '</span>'
      + '</div>'
      + '<div class="track"><div class="fill" style="width:' + barW + '%;background:' + c + '"></div></div>'
      + '<div class="reset">Resets in <b>' + rel + '</b></div>'
      + '</div>');
  }

  function billingCard(eu) {
    if (!eu) return '';
    const sym  = currencySymbol(eu.currency);
    const pct  = eu.utilization;
    const barW = Math.min(pct, 100).toFixed(1);
    return (
      '<div class="billing">'
      + '<div class="billing-row">'
      + '<span class="label">Monthly billing</span>'
      + '<span class="billing-amount">' + sym + eu.usedCredits.toFixed(2) + ' / ' + sym + eu.monthlyLimit.toFixed(0) + '</span>'
      + '</div>'
      + '<div class="track"><div class="fill" style="width:' + barW + '%;background:' + color(pct) + '"></div></div>'
      + '</div>');
  }

  function render(data) {
    lastData = data;
    document.getElementById('mainView').innerHTML =
      card('5-hour',         data.fiveHour,      5 * 3600 * 1000,       'Session') +
      card('7-day',          data.sevenDay,       7 * 24 * 3600 * 1000,  'Week') +
      card('Sonnet (7-day)', data.sevenDaySonnet) +
      card('Opus (7-day)',   data.sevenDayOpus) +
      billingCard(data.extraUsage);
    document.getElementById('updatedEl').textContent =
      'updated ' + new Date(data.fetchedAt).toLocaleTimeString();
    document.getElementById('staleEl').classList.toggle('show', !!data.isStale);
  }

  setInterval(() => { if (lastData) render(lastData); }, 60000);

  const conn = new signalR.HubConnectionBuilder()
    .withUrl('/hub/usage')
    .withAutomaticReconnect()
    .build();

  conn.on('usageUpdated', render);

  (async function connect() {
    try { await conn.start(); }
    catch (e) { console.warn('SignalR connect failed, retrying in 5s', e); setTimeout(connect, 5000); }
  })();

  fetch('/api/usage')
    .then(r => r.ok ? r.json() : null)
    .then(d => { if (d) render(d); })
    .catch(e => console.warn('Initial fetch failed:', e));

  // ---- Settings ----

  window.openSettings = function() {
    document.getElementById('mainView').classList.add('hidden');
    document.getElementById('settingsView').classList.remove('hidden');
    loadSettings();
  };

  function closeSettings() {
    document.getElementById('settingsView').classList.add('hidden');
    document.getElementById('mainView').classList.remove('hidden');
  }

  async function loadSettings() {
    document.getElementById('saveMsg').textContent = '';
    try {
      const r = await fetch('/api/settings');
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const s = await r.json();
      document.getElementById('settingAutostart').checked   = s.startWithWindows;
      document.getElementById('settingCloseToTray').checked = s.closeToTray;
      document.getElementById('settingPort').value          = s.serverPort;
    } catch (e) {
      const msg = document.getElementById('saveMsg');
      msg.style.color = 'var(--red)';
      msg.textContent = 'Failed to load settings.';
    }
  }

  async function saveSettings() {
    const btn = document.getElementById('saveBtn');
    const msg = document.getElementById('saveMsg');
    btn.disabled = true;
    msg.textContent = '';
    try {
      const body = {
        startWithWindows: document.getElementById('settingAutostart').checked,
        closeToTray:      document.getElementById('settingCloseToTray').checked,
        serverPort:       parseInt(document.getElementById('settingPort').value, 10),
      };
      const r = await fetch('/api/settings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      msg.style.color = 'var(--green)';
      msg.textContent = 'Saved.';
    } catch (e) {
      msg.style.color = 'var(--red)';
      msg.textContent = 'Save failed.';
    } finally {
      btn.disabled = false;
    }
  }
</script>

</body>
</html>
